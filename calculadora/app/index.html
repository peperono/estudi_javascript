<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            margin-top: 50px;
        }
        input {
            display: block;
            margin: auto;
            margin-bottom: 10px;
        }
    </style>  
    <script src="./index.js" defer></script>     
</head>
<body>
    <h1>Calculadora Gatets</h1>
    <input type="text" id="op1" placeholder="Ingrese el primer número">
    <input type="text" id="operador" placeholder="Ingrese el operador (+, -, *, /)">
    <input type="text" id="op2" placeholder="Ingrese el segundo número">
    <input type="submit" value="Calcular" id="calcular">
    <p id="resultado"></p>
</body>
</html>
